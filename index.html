<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind CSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/favicon-github.png"
      type="image/x-icon"
    />

    <!-- raw css  -->
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Github Issue Tracker | Login</title>
  </head>
  <body>
    <main class="my-25 sm:my-0">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box h-auto w-sm md:w-md mx-auto border shadow-xl mt-5 p-4"
      >
        <div class="text-center mb-4">
          <img
            class="mx-auto mb-3"
            src="./assets/github-logo.png"
            alt="github-logo"
          />
          <h2 class="text-neutral text-2xl font-semibold mb-1">
            GitHub Issues Tracker
          </h2>
          <p class="text-[14px] text-slate-500">
            Sign in to manage your issues
          </p>
        </div>

        <label class="label text-neutral-900 font-medium text-[16px]"
          >Username</label
        >
        <input
          id="text-input"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />
        <p class="text-[#4A00FF]">Default: admin</p>

        <label class="label text-neutral-900 font-medium text-[16px]"
          >Password</label
        >
        <input
          id="pass-input"
          type="password"
          class="input w-full"
          placeholder="Password"
        />
        <p class="text-[#4A00FF]">Default: admin123</p>

        <button id="signIn-btn" class="btn btn-primary mt-4">Sign In</button>

        <!-- divider -->
        <div class="w-full flex items-center gap-1 my-2">
          <span class="border border-gray-300 w-[50%]"></span>
          <span class="text-[16px]">OR</span>
          <span class="border border-gray-300 w-[50%]"></span>
        </div>

        <!-- demo credentials -->
        <div class="text-center">
          <h4 class="text-sm text-slate-500">Demo Credentials:</h4>
          <p class="text-[16px] font-semibold mt-4">
            Username:<span class="text-[16px] font-normal"> admin</span>
          </p>
          <p class="text-[16px] font-semibold">
            Password:<span class="text-[16px] font-normal"> admin123</span>
          </p>
        </div>
      </fieldset>
    </main>

    <!--js -->
    <script src="./script/login.js"></script>
  </body>
</html>
