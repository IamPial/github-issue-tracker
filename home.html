<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind CSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/favicon-github.png"
      type="image/x-icon"
    />

    <!-- raw css  -->
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Github Issue Tracker | Home</title>
  </head>
  <body>
    <!-- header section start -->
    <header class="bg-base-100 shadow-sm px-3">
      <div class="navbar flex-col space-y-3 sm:flex-row sm:space-y-0">
        <div class="flex-1">
          <div class="flex items-center gap-1">
            <img src="./assets/github-logo.png" class="w-10 h-10" alt="" />
            <a class="text-2xl font-semibold text-neutral-900"
              >GitHub Issues Tracker</a
            >
          </div>
        </div>
        <div class="flex gap-2">
          <div class="relative border border-gray-200 flex rounded-md">
            <i
              class="absolute text-gray-500 top-2.5 left-2 z-10 fa-brands fa-sistrix"
            ></i>
            <input
              type="text"
              placeholder="Search issues..."
              class="border-0 mx-7 outline-0 w-24 md:w-auto truncate"
            />
          </div>
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>
    <!-- header section end -->

    <main>
      <!-- active button section start -->
      <section class="w-11/12 mx-auto pt-5 sm:pt-10">
        <div
          class="shadow-sm flex justify-center sm:justify-start gap-2 rounded-lg p-6 sm:text-left"
        >
          <button
            onclick="showActive('all')"
            id="all"
            class="btn btn-primary w-30 text-slate-500"
          >
            All
          </button>
          <button
            onclick="showActive('open')"
            id="open"
            class="btn bg-base-200 w-30 text-slate-500"
          >
            Open
          </button>
          <button
            onclick="showActive('closed')"
            id="closed"
            class="btn bg-base-200 w-30 text-slate-500"
          >
            Closed
          </button>
        </div>
      </section>
      <!-- active button section end -->

      <!-- github issue section start -->
      <section class="w-11/12 mx-auto pt-4">
        <!-- track issue start -->
        <div class="p-6 shadow-sm flex justify-between items-center">
          <div class="flex gap-2 items-center">
            <div class="rounded-full bg-[#ECE4FF] p-2">
              <img src="./assets/Aperture.png" class="" alt="spinner" />
            </div>
            <div>
              <h2 class="text-xl font-semibold text-slate-800">50 Issues</h2>
              <p class="text-[16px] text-slate-500">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <!-- status start -->
          <div class="flex items-center gap-2">
            <span class="status status-success bg-green-500"></span>
            <span class="text-[16px] font-medium text-slate-800">Open</span>
            <span class="status status-success bg-purple-600"></span>
            <span class="text-[16px] font-medium text-slate-800">Closed</span>
          </div>
          <!-- status end -->
        </div>
        <!-- track issue end -->
      </section>
      <!-- github issue section end -->
    </main>

    <script src="./script/home.js"></script>
  </body>
</html>
